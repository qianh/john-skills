# registry.yaml — 节点登记表（跨执行器差异沉淀于此）
#
# 约束：
# - 不允许 method 类型；spec skill 不再提供框架内置节点方法兜底。
# - invocations 按优先级探测；都不可用且未选择允许的 native agent 模式时，节点 blocked: install_required。
# - install 指向 references/install.md 中的安装项。用户在 Gate 1 选择安装后，自动核实、安装、验证。
# - subagent.supported=true 的节点必须在 Gate 1 让用户选择 subagent 或 current-agent。
# - auxiliary:true 的候选为补充/备选风味，不抢占主绑定的探测优先级（始终排在主绑定之后）。

execution_kinds:
  - skill
  - tool
  - agent

execution_modes:
  - current-agent
  - subagent

installables:
  openspec:
    type: tool
    verify_before_install: true
    install_ref: references/install.md#openspec
  taskmaster:
    type: tool
    verify_before_install: true
    install_ref: references/install.md#taskmaster
  tdd-guard:
    type: tool
    verify_before_install: true
    install_ref: references/install.md#tdd-guard
  missing-skill:
    type: skill
    verify_before_install: true
    install_ref: references/install.md#missing-skill

nodes:

  N0_project_base:
    stage: 项目底座
    produces: [AGENTS.md/CLAUDE.md 种子, docs/STANDARDS, docs/COMMANDS]
    exit_gate: 标准与命令齐
    missing_policy: install_or_adjust_plan
    subagent:
      supported: false
      native_current_agent_allowed: true
    invocations:
      - { env: claude-code, kind: skill, name: init, install: missing-skill }

  NS_scope_discovery:
    stage: 跨服务/跨仓范围发现
    # 老项目强制：当前仓常只是功能的一部分，必须先发现关联前后端/服务，否则 spec 只覆盖半边。
    # 由真实执行器（agent 子代理）完成，编排器不自扫。
    produces: [涉及服务/仓清单, 关联 API/配置/DB/Apollo/回调链, 各服务改动面]
    exit_gate: 跨栈范围界定并经用户确认（greenfield 无既有服务标 N/A）
    missing_policy: install_or_adjust_plan
    subagent:
      supported: true
      choice_required: true
      role: explorer
      use_when: "老项目；当前路径只是功能一部分，需跨仓发现关联前端/后端/服务/API/DB"
      current_agent_allowed: true
      native_current_agent_allowed: false
      native_subagent_allowed: false
    invocations:
      - { env: claude-code, kind: agent, name: Explore, role: cross_service_scan, install: missing-skill }
      - { env: codex, kind: skill, name: codebase-analyzer, role: cross_service_scan, install: missing-skill }

  N1_grill:
    stage: 需求拷问
    flavor_rule: "有码库→grill-with-docs；无码库→grill-me；greenfield 需求发散可辅以 brainstorming"
    produces: [问题与非目标, 失败路径, 验收草案]
    exit_gate: 真实意图被逼出
    missing_policy: install_or_adjust_plan
    subagent:
      supported: true
      choice_required: true
      role: explorer
      use_when: "老项目、大需求、领域边界模糊，且拷问可与本地代码扫描并行"
      current_agent_allowed: true
      native_current_agent_allowed: false
      native_subagent_allowed: false
    invocations:
      - { env: any, kind: skill, name: grill-with-docs, condition: brownfield, install: missing-skill }
      - { env: any, kind: skill, name: grill-me, condition: greenfield, install: missing-skill }
      - { env: codex, kind: skill, name: codebase-analyzer, role: context_scan, auxiliary: true, install: missing-skill }
      - { env: claude-code, kind: skill, name: "superpowers:brainstorming", condition: "greenfield 需求发散", auxiliary: true, install: missing-skill }

  N2_domain:
    stage: 领域建模
    produces: [领域词表/UBIQUITOUS_LANGUAGE]
    exit_gate: 词汇人机一致
    missing_policy: install_or_adjust_plan
    subagent:
      supported: true
      choice_required: true
      role: explorer
      use_when: "术语跨多个模块或需要并行提取代码中的领域语言"
      current_agent_allowed: true
      native_current_agent_allowed: false
      native_subagent_allowed: false
    invocations:
      - { env: any, kind: skill, name: grill-with-docs, install: missing-skill }
      - { env: codex, kind: skill, name: codebase-analyzer, role: domain_scan, auxiliary: true, install: missing-skill }

  N3_spec:
    stage: 规格
    # CC 无 sdd-development（codex-only）时，OpenSpec 作为 env:any 主绑定承接全规模（含 H）。
    flavor_rule: "规模L/M→OpenSpec；规模H/新项目→sdd-development(codex)/Spec Kit，CC 无 sdd 时 OpenSpec 承全规模；风险H→对抗审查"
    produces: [需求, 数据模型/API/UI/兼容/权限, 验收标准, 测试策略]
    exit_gate: 关键闸·定稿
    missing_policy: install_or_adjust_plan
    subagent:
      supported: true
      choice_required: true
      role: explorer
      use_when: "需要独立规格审查、反向质疑或把规格编写与本地代码阅读并行"
      current_agent_allowed: true
      native_current_agent_allowed: false
      native_subagent_allowed: false
    invocations:
      - { env: codex, kind: skill, name: sdd-development, condition: "规模H或新项目", install: missing-skill }
      - { env: any, kind: tool, name: openspec, condition: "全规模（规模H 且无 sdd 时由 OpenSpec 承接，见 flavor_rule）", install: openspec }
      - { env: any, kind: skill, name: requesting-code-review, condition: "风险H规格审查", auxiliary: true, install: missing-skill }
      - { env: claude-code, kind: skill, name: to-prd, condition: "产出 PRD 并发布到 issue tracker", auxiliary: true, install: missing-skill }

  N4_tasks:
    stage: 任务拆解
    flavor_rule: "默认→writing-plans；仅用户明确要求时→Taskmaster；issue tracker 化→to-issues"
    produces: [tasks（大则裂变 tasks.md）]
    exit_gate: 任务可单测单审
    missing_policy: install_or_adjust_plan
    subagent:
      supported: true
      choice_required: true
      role: explorer
      use_when: "任务可按模块拆分，适合让子代理生成独立任务切片"
      current_agent_allowed: true
      native_current_agent_allowed: false
      native_subagent_allowed: false
    invocations:
      - { env: claude-code, kind: skill, name: "superpowers:writing-plans", install: missing-skill }
      - { env: codex, kind: skill, name: planning-with-files, install: missing-skill }
      - { env: codex, kind: skill, name: writing-plans, install: missing-skill }
      - { env: any, kind: tool, name: taskmaster, condition: "仅用户明确要求使用 Taskmaster 时", install: taskmaster }
      - { env: claude-code, kind: skill, name: to-issues, condition: "拆成 issue tracker 条目", auxiliary: true, install: missing-skill }

  N5_implement:
    stage: 实现
    flavor_rule: "默认 TDD + worktree；风险H→TDD Guard；多独立任务可选 subagent（executing-plans/subagent-driven-development）"
    produces: [实现+测试, 状态]
    exit_gate: 红绿重构走完
    missing_policy: install_or_adjust_plan
    subagent:
      supported: true
      choice_required: true
      role: worker
      use_when: "任务可拆成互不重叠的文件/模块写入范围"
      current_agent_allowed: true
      native_current_agent_allowed: false
      native_subagent_allowed: false
      requires_disjoint_write_sets: true
    invocations:
      - { env: claude-code, kind: skill, name: "superpowers:test-driven-development", install: missing-skill }
      - { env: claude-code, kind: skill, name: "superpowers:using-git-worktrees", auxiliary: true, install: missing-skill }
      - { env: claude-code, kind: skill, name: tdd, install: missing-skill }
      - { env: codex, kind: skill, name: test-driven-development, install: missing-skill }
      - { env: codex, kind: skill, name: using-git-worktrees, auxiliary: true, install: missing-skill }
      - { env: any, kind: tool, name: tdd-guard, condition: "风险H", install: tdd-guard }
      - { env: claude-code, kind: skill, name: "superpowers:executing-plans", condition: "已有书面计划、分会话执行", auxiliary: true, install: missing-skill }
      - { env: claude-code, kind: skill, name: "superpowers:subagent-driven-development", condition: "独立任务派子代理执行", auxiliary: true, install: missing-skill }

  N6_verify:
    stage: 验证
    produces: [验证记录(DoD)]
    exit_gate: DoD 全绿（lint/typecheck/test/build）
    missing_policy: install_or_adjust_plan
    subagent:
      supported: false
      reason: "最终完成声明必须由当前 agent 读取验证输出后作出"
      # 末位兜底：verify 类推荐技能全缺时，允许当前 agent 直接跑 lint/test/build 并读输出。
      # 这不是内嵌方法兜底——验证本就是当前 agent 能直接执行的真实工作，借此消除永久 blocked 脆性。
      native_current_agent_allowed: true
    invocations:
      - { env: claude-code, kind: skill, name: "superpowers:verification-before-completion", install: missing-skill }
      - { env: claude-code, kind: skill, name: verify, install: missing-skill }
      - { env: codex, kind: skill, name: verification-before-completion, install: missing-skill }

  N7_review:
    stage: 审查
    flavor_rule: "默认 code-review / requesting-code-review；风险H→对抗审查"
    produces: [审查记录]
    exit_gate: 关键闸·审查
    missing_policy: install_or_adjust_plan
    subagent:
      supported: true
      choice_required: true
      role: explorer
      use_when: "需要独立上下文审查 diff/spec，尤其是风险H或合并前"
      current_agent_allowed: true
      native_current_agent_allowed: true
      native_subagent_allowed: true
    invocations:
      - { env: claude-code, kind: skill, name: "superpowers:requesting-code-review", install: missing-skill }
      - { env: claude-code, kind: skill, name: code-review, install: missing-skill }
      - { env: codex, kind: skill, name: requesting-code-review, install: missing-skill }

  N8_archive:
    stage: 归档
    produces: [决策/被否方案/新领域词/遗留 TODO]
    exit_gate: 留痕完成
    missing_policy: install_or_adjust_plan
    subagent:
      supported: false
      native_current_agent_allowed: true
    invocations: []
